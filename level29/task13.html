<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form with Select and Textarea</title>
</head>
<body>
    <form action="#" method="post">
        <label for="country">Escolha um país:</label>
        <select id="country" name="country">
            <option value="russia">Rússia</option>
            <option value="usa">EUA</option>
            <option value="china">China</option>
            <option value="germany">Alemanha</option>
            <option value="brazil">Brasil</option>
        </select>
        <br><br>
        <label for="additionalInfo">Informações adicionais:</label><br>
        <textarea id="additionalInfo" name="additionalInfo" rows="4" cols="50"></textarea>
        <br><br>
        <button type="submit">Enviar</button>
    </form>
</body>
</html>
